openapi: 3.0.3

info:
  title: API del Sistema de Triaje de Solicitudes Académicas SAC
  version: 1.0.0
  description: |
    API REST para el proyecto universitario SAC (Sistema de Atención y Clasificación) - Hito 2.
    Centraliza solicitudes académicas, las clasifica y prioriza, asigna personal,
    rastrea el ciclo de vida completo y mantiene un historial auditable.

    ## Estado de Autenticación (Hito 2)
    **Nota importante:** En esta versión del Hito 2, todos los endpoints son públicos (sin autenticación requerida).
    La autenticación JWT será implementada completamente en Hito 3.
    `/auth/login` devuelve un token placeholder, no un JWT real.

    ## Roles (enum RolNombre)
    | Rol             | Descripción |
    |-----------------|-------------|
    | COORDINADOR     | Acceso completo (documentado para uso futuro) |
    | ADMINISTRATIVO  | Gestionar solicitudes/usuarios (documentado para uso futuro) |
    | ESTUDIANTE      | Crear solicitudes y consultar propias (documentado para uso futuro) |

    ## Ciclo de Vida de Solicitudes
    ```
    REGISTRADA -> CLASIFICADA -> EN_ATENCION -> ATENDIDA -> CERRADA
    ```
    - Las solicitudes cerradas NO pueden ser modificadas
    - Solo se puede cerrar una solicitud en estado ATENDIDA
    - La observación es obligatoria al cerrar
    - Las transiciones inválidas devuelven 409 Conflict

    ## Reglas de Prioridad
    La prioridad se calcula a partir de: ImpactoAcademico + FechaLimite (días restantes) + TipoSolicitudNombre.
    El sistema almacena `prioridad` y `justificacionPrioridad` en cada solicitud.

servers:
  - url: http://localhost:8080
    description: Servidor de desarrollo local

tags:
  - name: Auth
    description: Autenticación (registro e inicio de sesión)
  - name: Users
    description: Administración de usuarios
  - name: Requests
    description: Gestión de solicitudes académicas

paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Registrar un nuevo usuario
      description: |
        Crea una nueva cuenta de usuario. Por defecto, el usuario se crea con `activo=true`.
        Este es un endpoint público (no requiere autenticación).
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequestDTO'
            example:
              nombre: "Juan Perez"
              email: "juan@uq.edu.co"
              identificacion: "1094000001"
              password: "S3cur3P@ss!"
              rol: ESTUDIANTE
      responses:
        '201':
          description: Usuario registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioDTO'
              example:
                id: 1
                nombre: "Juan Perez"
                email: "juan@uq.edu.co"
                identificacion: "1094000001"
                activo: true
                rol: ESTUDIANTE
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      description: |
        Autentica un usuario y devuelve un token (placeholder en Hito 2, JWT en Hito 3).
        Este es un endpoint público (no requiere autenticación previa).
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequestDTO'
            example:
              email: "juan@uq.edu.co"
              password: "S3cur3P@ss!"
      responses:
        '200':
          description: Autenticación exitosa (token placeholder)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseDTO'
              example:
                token: "placeholder-token-1-1712512800000"
                tipo: "Bearer"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/usuarios:
    get:
      tags: [Users]
      summary: Listar todos los usuarios
      description: "Devuelve una lista de todos los usuarios registrados."
      operationId: listUsers
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioDTO'
              example:
                - id: 1
                  nombre: "Juan Perez"
                  email: "juan@uq.edu.co"
                  identificacion: "1094000001"
                  activo: true
                  rol: ESTUDIANTE
                - id: 2
                  nombre: "Maria Admin"
                  email: "maria@uq.edu.co"
                  identificacion: "1094000002"
                  activo: true
                  rol: ADMINISTRATIVO
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/usuarios/{id}:
    get:
      tags: [Users]
      summary: Obtener detalle de usuario
      operationId: getUserById
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Detalle del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioDTO'
              example:
                id: 1
                nombre: "Juan Perez"
                email: "juan@uq.edu.co"
                identificacion: "1094000001"
                activo: true
                rol: ESTUDIANTE
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/usuarios/{id}/activar:
    patch:
      tags: [Users]
      summary: Activar un usuario
      description: Activa el usuario (habilitar como responsable asignable).
      operationId: activateUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Usuario activado (sin contenido)
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/usuarios/{id}/desactivar:
    patch:
      tags: [Users]
      summary: Desactivar un usuario
      description: Desactiva el usuario (no se puede asignar como responsable).
      operationId: deactivateUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Usuario desactivado (sin contenido)
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/usuarios/responsables:
    get:
      tags: [Users]
      summary: Listar usuarios responsables activos
      description: Devuelve usuarios con `activo=true` (útil para asignaciones de solicitudes).
      operationId: listActiveResponsibles
      responses:
        '200':
          description: Responsables activos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioDTO'
              example:
                - id: 2
                  nombre: "Maria Admin"
                  email: "maria@uq.edu.co"
                  identificacion: "1094000002"
                  activo: true
                  rol: ADMINISTRATIVO
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/solicitudes:
    post:
      tags: [Requests]
      summary: Crear una nueva solicitud
      description: |
        Registra una nueva solicitud en estado `REGISTRADA`.
        - La prioridad se calcula automáticamente (impacto + fechaLimite + tipo)
        - Se genera justificacionPrioridad automáticamente
        - Se crea la primera entrada del historial
      operationId: createSolicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SolicitudCreateDTO'
            example:
              descripcion: "Solicitud de homologación de asignatura"
              canal: CORREO
              solicitanteId: 1
              impacto: MEDIO
              fechaLimite: "2026-04-01T23:59:59"
              tipo: HOMOLOGACION
      responses:
        '201':
          description: Solicitud creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: "Solicitante no encontrado"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Requests]
      summary: Listar/filtrar solicitudes
      description: |
        Devuelve solicitudes con soporte para filtrado por:
        - Estado: REGISTRADA, CLASIFICADA, EN_ATENCION, ATENDIDA, CERRADA
        - Prioridad: BAJA, MEDIA, ALTA, CRITICA
        - Tipo de solicitud: HOMOLOGACION, SOLICITUD_CUPO, CANCELACION_ASIGNATURA, REGISTRO_ASIGNATURA, CONSULTA_ACADEMICA, OTRO
        - Canal: CSU, CORREO, SAC, TELEFONICO, PRESENCIAL
        - Responsable ID
        - Rango de fechas (ISO 8601 format)
      operationId: listSolicitudes
      parameters:
        - name: estado
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EstadoSolicitud'
          example: CLASIFICADA
        - name: prioridad
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Prioridad'
          example: ALTA
        - name: tipoSolicitud
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TipoSolicitudNombre'
          example: HOMOLOGACION
        - name: canalOrigen
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CanalOrigen'
          example: CORREO
        - name: responsableId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          example: 2
        - name: desde
          in: query
          required: false
          schema:
            type: string
            format: date-time
          example: "2026-03-01T00:00:00"
        - name: hasta
          in: query
          required: false
          schema:
            type: string
            format: date-time
          example: "2026-04-01T23:59:59"
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponseDTO'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/solicitudes/{id}:
    get:
      tags: [Requests]
      summary: Obtener detalle de solicitud
      operationId: getSolicitudById
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      responses:
        '200':
          description: Detalle de solicitud
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/solicitudes/{id}/clasificar:
    put:
      tags: [Requests]
      summary: Clasificar una solicitud
      description: |
        Clasifica una solicitud (transición REGISTRADA → CLASIFICADA).
        - Campo `tipoSolicitud`, `impacto` y `fechaLimite` son obligatorios
        - La prioridad se recalcula
        - La justificacionPrioridad se regenera
        - Se registra en el historial
        - Solo funciona si la solicitud está en estado REGISTRADA
      operationId: clasificarSolicitud
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClasificarDTO'
            example:
              tipoSolicitud: CANCELACION_ASIGNATURA
              impacto: MEDIO
              fechaLimite: "2026-04-15T23:59:59"
              observacion: "Reclasificación por análisis actualizado"
      responses:
        '200':
          description: Solicitud clasificada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto - La solicitud no está en estado REGISTRADA,
            o falta alguno de los campos obligatorios (tipoSolicitud, impacto, fechaLimite)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/solicitudes/{id}/asignar:
    put:
      tags: [Requests]
      summary: Asignar usuario responsable
      description: |
        Asigna un usuario responsable a la solicitud.
        - El responsable debe existir y estar activo
        - No se puede asignar responsable a una solicitud cerrada
      operationId: asignarResponsable
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarDTO'
            example:
              responsableId: 2
      responses:
        '200':
          description: Responsable asignado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: "Solicitud o responsable no encontrado"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: |
            Conflicto - El responsable está inactivo,
            o la solicitud está cerrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/solicitudes/{id}/estado:
    put:
      tags: [Requests]
      summary: Cambiar estado de la solicitud
      description: |
        Cambia el estado de la solicitud validando las transiciones.
        Transiciones válidas: REGISTRADA → CLASIFICADA → EN_ATENCION → ATENDIDA → CERRADA
        - Cualquier otra transición devuelve 409 Conflict
        - Una solicitud cerrada no puede cambiar de estado
      operationId: cambiarEstadoSolicitud
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarEstadoDTO'
            example:
              nuevoEstado: EN_ATENCION
              observacion: "Inicia atención por responsable asignado"
      responses:
        '200':
          description: Estado actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto - Transición inválida, o la solicitud está cerrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/solicitudes/{id}/cerrar:
    put:
      tags: [Requests]
      summary: Cerrar una solicitud
      description: |
        Cierra una solicitud (transición ATENDIDA → CERRADA).
        - La solicitud DEBE estar en estado ATENDIDA
        - La observación es obligatoria (no puede estar vacía)
        - Una solicitud cerrada no puede ser modificada
      operationId: cerrarSolicitud
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CerrarDTO'
            example:
              observacion: "Caso resuelto y comunicado al solicitante"
      responses:
        '200':
          description: Solicitud cerrada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto - La solicitud no está en estado ATENDIDA,
            ya está cerrada, o falta la observación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/solicitudes/{id}/historial:
    get:
      tags: [Requests]
      summary: Obtener historial de auditoría de solicitud
      description: |
        Devuelve el registro completo de cambios y acciones sobre la solicitud,
        ordenados cronológicamente.
      operationId: getSolicitudHistorial
      parameters:
        - $ref: '#/components/parameters/SolicitudId'
      responses:
        '200':
          description: Lista del historial de auditoría
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistorialEntryDTO'
              example:
                - fechaHora: "2026-03-01T10:30:00"
                  accion: REGISTRO
                  observacion: "Solicitud registrada"
                  estadoAnterior: null
                  estadoNuevo: REGISTRADA
                  actorId: 1
                - fechaHora: "2026-03-01T14:00:00"
                  accion: CLASIFICACION
                  observacion: "Clasificada como homologación"
                  estadoAnterior: REGISTRADA
                  estadoNuevo: CLASIFICADA
                  actorId: null
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    SolicitudId:
      name: id
      in: path
      required: true
      description: ID de la Solicitud
      schema:
        type: integer
        format: int64
        example: 1

    UserId:
      name: id
      in: path
      required: true
      description: ID de Usuario
      schema:
        type: integer
        format: int64
        example: 1

  schemas:
    AuthRequestDTO:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Email del usuario
          example: "juan@uq.edu.co"
        password:
          type: string
          description: Contraseña del usuario
          example: "S3cur3P@ss!"

    RegisterRequestDTO:
      type: object
      required: [nombre, email, identificacion, password, rol]
      properties:
        nombre:
          type: string
          description: Nombre completo del usuario
          example: "Juan Perez"
        email:
          type: string
          format: email
          description: Email único del usuario
          example: "juan@uq.edu.co"
        identificacion:
          type: string
          description: Número de identificación
          example: "1094000001"
        password:
          type: string
          description: Contraseña del usuario
          example: "S3cur3P@ss!"
        rol:
          $ref: '#/components/schemas/RolNombre'
          description: Rol del usuario en el sistema

    AuthResponseDTO:
      type: object
      required: [token, tipo]
      properties:
        token:
          type: string
          description: Token de acceso (placeholder en Hito 2, será JWT en Hito 3)
          example: "placeholder-token-1-1712512800000"
        tipo:
          type: string
          description: Tipo de autenticación
          example: "Bearer"

    UsuarioDTO:
      type: object
      required: [id, nombre, email, identificacion, activo, rol]
      properties:
        id:
          type: integer
          format: int64
          description: ID único del usuario
          example: 1
        nombre:
          type: string
          description: Nombre completo
          example: "Juan Perez"
        email:
          type: string
          format: email
          description: Email del usuario
          example: "juan@uq.edu.co"
        identificacion:
          type: string
          description: Número de identificación
          example: "1094000001"
        activo:
          type: boolean
          description: Estado del usuario (true=activo, false=inactivo)
          example: true
        rol:
          $ref: '#/components/schemas/RolNombre'
          description: Rol del usuario

    SolicitudCreateDTO:
      type: object
      required:
        - descripcion
        - canal
        - solicitanteId
        - impacto
        - tipo
      properties:
        descripcion:
          type: string
          description: Descripción detallada de la solicitud
          example: "Solicitud de homologación de asignatura de pregrado"
        canal:
          $ref: '#/components/schemas/CanalOrigen'
          description: Canal por el cual ingresó la solicitud
        solicitanteId:
          type: integer
          format: int64
          description: ID del usuario solicitante
          example: 1
        impacto:
          $ref: '#/components/schemas/ImpactoAcademico'
          description: Impacto académico de la solicitud
        fechaLimite:
          type: string
          format: date-time
          nullable: true
          description: Fecha límite de resolución (ISO 8601)
          example: "2026-04-01T23:59:59"
        tipo:
          $ref: '#/components/schemas/TipoSolicitudNombre'
          description: Tipo de solicitud

    SolicitudResponseDTO:
      type: object
      required:
        - id
        - descripcion
        - fechaRegistro
        - estado
        - prioridad
        - canalOrigen
        - tipoSolicitud
        - solicitante
        - impacto
      properties:
        id:
          type: integer
          format: int64
          description: ID único de la solicitud
          example: 10
        descripcion:
          type: string
          description: Descripción de la solicitud
          example: "Solicitud de homologación de asignatura"
        fechaRegistro:
          type: string
          format: date-time
          description: Fecha y hora de registro (ISO 8601)
          example: "2026-03-01T10:30:00"
        estado:
          $ref: '#/components/schemas/EstadoSolicitud'
          description: Estado actual de la solicitud
        prioridad:
          $ref: '#/components/schemas/Prioridad'
          description: Prioridad calculada automáticamente
        justificacionPrioridad:
          type: string
          nullable: true
          description: Explicación del cálculo de prioridad
          example: "Impacto=MEDIO(+20) + FechaLimite=9d(+5) + Tipo=HOMOLOGACION(+30) => Total=55 => MEDIA"
        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'
          description: Canal de entrada de la solicitud
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitudNombre'
          description: Tipo de solicitud
        solicitante:
          type: string
          description: Nombre del solicitante
          example: "Juan Perez"
        responsable:
          type: string
          nullable: true
          description: Nombre del usuario responsable (si está asignado)
          example: "Maria Admin"
        fechaLimite:
          type: string
          format: date-time
          nullable: true
          description: Fecha límite (ISO 8601)
          example: "2026-04-01T23:59:59"
        impacto:
          $ref: '#/components/schemas/ImpactoAcademico'
          description: Impacto académico

    ClasificarDTO:
      type: object
      required: [tipoSolicitud, impacto, fechaLimite]
      properties:
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitudNombre'
          description: Tipo de solicitud (requerido)
        impacto:
          $ref: '#/components/schemas/ImpactoAcademico'
          description: Impacto académico actualizado (requerido)
        fechaLimite:
          type: string
          format: date-time
          description: Fecha límite actualizada (requerida)
          example: "2026-04-15T23:59:59"
        observacion:
          type: string
          nullable: true
          maxLength: 1000
          description: Observación sobre la clasificación
          example: "Reclasificación por análisis actualizado"

    AsignarDTO:
      type: object
      required: [responsableId]
      properties:
        responsableId:
          type: integer
          format: int64
          description: ID del usuario responsable a asignar
          example: 2

    CambiarEstadoDTO:
      type: object
      required: [nuevoEstado]
      properties:
        nuevoEstado:
          $ref: '#/components/schemas/EstadoSolicitud'
          description: Nuevo estado de la solicitud
        observacion:
          type: string
          nullable: true
          maxLength: 1000
          description: Observación sobre el cambio de estado
          example: "Cambio en proceso de gestión administrativa"

    CerrarDTO:
      type: object
      required: [observacion]
      properties:
        observacion:
          type: string
          maxLength: 2000
          description: Observación de cierre (obligatoria y no puede estar vacía)
          example: "Caso resuelto y comunicado al solicitante"

    HistorialEntryDTO:
      type: object
      required: [fechaHora, accion, estadoNuevo, actorId]
      properties:
        fechaHora:
          type: string
          format: date-time
          description: Fecha y hora del evento (ISO 8601)
          example: "2026-03-01T10:30:00"
        accion:
          $ref: '#/components/schemas/AccionHistorial'
          description: Tipo de acción registrada
        observacion:
          type: string
          nullable: true
          description: Observación adicional del evento
          example: "Registro inicial"
        estadoAnterior:
          allOf:
            - $ref: '#/components/schemas/EstadoSolicitud'
          nullable: true
          description: Estado anterior (null si es primera acción)
        estadoNuevo:
          $ref: '#/components/schemas/EstadoSolicitud'
          description: Estado nuevo
        actorId:
          type: integer
          format: int64
          nullable: true
          description: ID del usuario que realizó la acción (null si es acción del sistema)
          example: 2

    EstadoSolicitud:
      type: string
      enum:
        - REGISTRADA
        - CLASIFICADA
        - EN_ATENCION
        - ATENDIDA
        - CERRADA
      description: |
        Estados del ciclo de vida de solicitud.
        Transiciones válidas: REGISTRADA → CLASIFICADA → EN_ATENCION → ATENDIDA → CERRADA

    Prioridad:
      type: string
      enum:
        - BAJA
        - MEDIA
        - ALTA
        - CRITICA
      description: Nivel de prioridad calculado automáticamente

    CanalOrigen:
      type: string
      enum:
        - CSU
        - CORREO
        - SAC
        - TELEFONICO
        - PRESENCIAL
      description: Canal por el cual ingresó la solicitud

    ImpactoAcademico:
      type: string
      enum:
        - BAJO
        - MEDIO
        - ALTO
        - CRITICO
      description: Nivel de impacto académico de la solicitud

    RolNombre:
      type: string
      enum:
        - ESTUDIANTE
        - ADMINISTRATIVO
        - COORDINADOR
      description: Rol del usuario en el sistema

    TipoSolicitudNombre:
      type: string
      enum:
        - HOMOLOGACION
        - SOLICITUD_CUPO
        - CANCELACION_ASIGNATURA
        - REGISTRO_ASIGNATURA
        - CONSULTA_ACADEMICA
        - OTRO
      description: Tipo de solicitud académica

    AccionHistorial:
      type: string
      enum:
        - REGISTRO
        - CLASIFICACION
        - PRIORIZACION
        - ASIGNACION
        - CAMBIO_ESTADO
        - CIERRE
        - OBSERVACION
      description: Tipo de acción registrada en el historial

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora del error (ISO 8601)
          example: "2026-03-01T12:00:00"
        status:
          type: integer
          description: Código HTTP de estado
          example: 409
        error:
          type: string
          description: Nombre del error
          example: "Conflicto"
        message:
          type: string
          description: Mensaje descriptivo del error
          example: "No se puede asignar responsable a una solicitud cerrada"
        path:
          type: string
          description: Path del endpoint donde ocurrió el error
          example: "/api/v1/solicitudes/1/asignar"

  responses:
    BadRequest:
      description: Solicitud Incorrecta - Error de validación o entrada inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-03-01T12:00:00"
            status: 400
            error: "Solicitud Incorrecta"
            message: "Error de validación: descripción es obligatoria"
            path: "/api/v1/solicitudes"

    Unauthorized:
      description: No Autorizado - Credenciales inválidas
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-03-01T12:00:00"
            status: 401
            error: "No Autorizado"
            message: "Email o contraseña incorrectos"
            path: "/api/v1/auth/login"

    NotFound:
      description: No Encontrado - El recurso no existe
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-03-01T12:00:00"
            status: 404
            error: "No Encontrado"
            message: "Solicitud no encontrada"
            path: "/api/v1/solicitudes/999"

    Conflict:
      description: |
        Conflicto - Violación de regla de negocio:
        - Transición de estado inválida
        - Responsable inactivo
        - Solicitud ya cerrada
        - Campos requeridos faltantes para clasificación
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-03-01T12:00:00"
            status: 409
            error: "Conflicto"
            message: "Transición inválida de CLASIFICADA a ATENDIDA"
            path: "/api/v1/solicitudes/1/estado"

    InternalServerError:
      description: Error Interno del Servidor - Fallo inesperado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-03-01T12:00:00"
            status: 500
            error: "Error Interno del Servidor"
            message: "Error inesperado"
            path: "/api/v1/solicitudes"
