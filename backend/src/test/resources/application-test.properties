# Configuración de test - Base de datos H2 en memoria
# Esta configuración se activa SOLO cuando se ejecutan tests con el perfil 'test'

# Datasource H2 en memoria
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (opcional, útil para debugging durante tests)
spring.h2.console.enabled=false

# Seguridad y JWT (mantenemos mismo secret para consistencia en tests)
